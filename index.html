<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chonchon ears ++</title>

    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="app">

    <aside class="sidebar">
        <h1>chonchon ears ++</h1>

        <button id="loadMusic">Add Music</button>
        <input type="file" id="musicInput" multiple accept="audio/*" hidden>

        <div class="filter-group">
            <h3>Browse</h3>

            <button data-sort="folder">Folders</button>
            <button data-sort="album">Albums</button>
            <button data-sort="artist">Artists</button>
            <button data-sort="date">Date Added</button>
        </div>
    </aside>

    <main class="content">

        <div class="topbar">
            <input id="search" type="text" placeholder="Search music...">
        </div>

        <div id="library" class="library"></div>

        <div class="player">

            <div class="track-info">
                <h2 id="trackTitle">No Track</h2>
                <p id="trackArtist">---</p>
            </div>

            <audio id="audio"></audio>

            <div class="controls">
                <button id="prev">⏮</button>
                <button id="play">▶</button>
                <button id="next">⏭</button>

                <button id="shuffle">🔀</button>
                <button id="repeatOne">🔂</button>
                <button id="repeatFolder">🔁</button>

		<button id="renameAlbum">✏️ Renommer</button>
		<button id="changeCover">🖼 Couverture</button>

		<input type="file" id="coverInput" accept="image/*" hidden>
            </div>

            <input type="range" id="progress" value="0">

        </div>

    </main>

</div>

<script src="app.js"></script>
</body>
</html>
